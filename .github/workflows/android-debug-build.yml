name: Android Testing Build Pipeline

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build-android-apk:
    name: Build Android Debug APK
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the source code repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Initialize Node.js environment with npm caching enabled
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      # Step 3: Clean install node packages
      - name: Install Dependencies
        run: npm ci || npm install

      # Step 4: Setup Java Development Kit (JDK 17) to support gradle compilation
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      # Step 5: Grant executable permissions to Gradle wrapper script
      - name: Grant Gradle Execute Permissions
        run: chmod +x android/gradlew

      # Step 6: Execute Gradle build task to compile Debug APK
      - name: Build Android Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      # Step 7: Upload compile artifact to GitHub runner window
      - name: Upload Testing APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-testing-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 7
